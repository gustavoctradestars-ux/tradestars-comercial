<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tradestars CRM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0d0f1a; --bg2: #131626; --bg3: #1a1e30; --card: #161929;
      --accent: #4f46e5; --accent2: #7c3aed; --green: #22c55e; --red: #ef4444;
      --yellow: #f59e0b; --text: #e8eaf6; --text2: #8b90b8; --border: #2a2f45;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    
    .login-page { display: none; height: 100vh; align-items: center; justify-content: center; }
    .login-page.active { display: flex; }
    .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 48px; width: 100%; max-width: 420px; }
    .login-title { font-size: 32px; font-weight: 800; margin-bottom: 40px; text-align: center; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-input { width: 100%; padding: 14px 16px; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); margin-bottom: 16px; font-size: 14px; }
    .login-input:focus { outline: none; border-color: var(--accent); }
    .login-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 15px; }
    .login-btn:hover { background: var(--accent2); }
    .login-error { color: var(--red); font-size: 13px; margin-bottom: 16px; text-align: center; }
    
    .app-page { display: none; height: 100vh; }
    .app-page.active { display: flex; }
    .container { display: flex; height: 100%; }
    .sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); padding: 28px 20px; overflow-y: auto; display: flex; flex-direction: column; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 24px 40px; display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-size: 28px; font-weight: 800; }
    .content { flex: 1; overflow-y: auto; padding: 40px; }
    
    .logo { font-size: 18px; font-weight: 800; margin-bottom: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .nav-item { padding: 13px 14px; margin-bottom: 8px; border-radius: 8px; cursor: pointer; font-size: 14px; color: var(--text2); border-left: 3px solid transparent; transition: all 0.2s; }
    .nav-item:hover { background: var(--bg3); color: var(--text); }
    .nav-item.active { background: var(--accent); color: white; border-left-color: var(--accent2); }
    .nav-item.hidden { display: none; }
    
    .dashboard-header { margin-bottom: 24px; }
    .dashboard-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text2); margin-bottom: 4px; }
    .dashboard-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 700; line-height: 1.1; }
    .dashboard-badge { display: inline-block; background: var(--primary-g); border: 1px solid rgba(59,130,246,.3); color: var(--primary); padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-top: 6px; }
    
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .kpi-card { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07); border-radius: 14px; padding: 18px 20px; position: relative; transition: border-color .2s, transform .2s; }
    .kpi-icon { font-size: 20px; margin-bottom: 10px; }
    .kpi-label { font-size: 10.5px; color: var(--text2); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; font-weight: 600; }
    .kpi-value { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 700; line-height: 1; color: var(--text); }
    .kpi-subtitle { font-size: 11px; color: var(--text2); margin-top: 5px; }
    .kpi-bar { height: 3px; background: rgba(255,255,255,.07); border-radius: 2px; margin-top: 12px; overflow: hidden; }
    .kpi-bar-fill { height: 100%; border-radius: 2px; transition: width .8s cubic-bezier(.4,0,.2,1); }
    .kpi-bar-blue .kpi-bar-fill { background: var(--accent); width: 100%; }
    .kpi-bar-green .kpi-bar-fill { background: var(--green); width: 100%; }
    .kpi-bar-yellow .kpi-bar-fill { background: var(--yellow); width: 100%; }
    .kpi-bar-red .kpi-bar-fill { background: var(--red); width: 100%; }
    
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .section-icon { font-size: 24px; }
    
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 28px; margin-bottom: 28px; }
    .table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .table th { background: var(--bg3); color: var(--text2); padding: 16px; text-align: left; font-weight: 700; border-bottom: 2px solid var(--border); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
    .table td { padding: 16px; border-bottom: 1px solid var(--border); }
    .table tr:hover { background: var(--bg3); }
    
    .badge { display: inline-block; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; background: rgba(16, 185, 129, 0.2); color: var(--green); }
    .badge-warning { background: rgba(245, 158, 11, 0.2); color: var(--yellow); }
    
    .btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--accent); color: white; }
    .btn:hover { background: var(--accent2); }
    .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    
    .sidebar-user { border-top: 1px solid var(--border); padding-top: 20px; margin-top: auto; }
    .user-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .user-role { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
    
    .empty { text-align: center; padding: 60px 40px; color: var(--text2); font-size: 16px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--green); padding: 16px 20px; border-radius: 8px; z-index: 2000; }
    .toast.error { border-left-color: var(--red); }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div class="login-page active" id="loginPage">
    <div class="login-card">
      <div class="login-title">TRADESTARS</div>
      <div id="loginError" class="login-error"></div>
      <input type="email" id="loginEmail" class="login-input" placeholder="Email">
      <input type="password" id="loginPassword" class="login-input" placeholder="Contraseña">
      <button class="login-btn" onclick="login()">Ingresar</button>
    </div>
  </div>

  <!-- APP -->
  <div class="app-page" id="appPage">
    <div class="container">
      <div class="sidebar">
        <div class="logo">TRADESTARS</div>
        <div id="nav" style="flex: 1;">
          <div class="nav-item active" onclick="goPage('dashboard')">📊 Dashboard</div>
          <div class="nav-item" onclick="goPage('ventas')">💰 Ventas</div>
          <div class="nav-item" onclick="goPage('registrar')">➕ Registrar</div>
          <div class="nav-item" onclick="goPage('closers')">👥 Closers</div>
          <div class="nav-item" onclick="goPage('metodos')">💳 Métodos</div>
          <div class="nav-item hidden" id="navValidar" onclick="goPage('validar')">✅ Validar</div>
          <div class="nav-item hidden" id="navUsers" onclick="goPage('usuarios')">👤 Usuarios</div>
        </div>
        
        <div class="sidebar-user">
          <div class="user-name" id="userName">-</div>
          <div class="user-role" id="userRole">-</div>
          <button class="btn btn-secondary" onclick="logout()" style="width: 100%;">Cerrar sesión</button>
        </div>
      </div>
      
      <div class="main">
        <div class="header">
          <div></div>
          <div id="status" style="font-size: 13px; color: var(--text2);">✅</div>
        </div>
        <div class="content" id="content"></div>
      </div>
    </div>
  </div>

  <script>
    const CSV_USUARIOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6p8RVY5emhNgjqFlN3s3fVQ3vPDNfQ8UpTZz47RXvhjY3pWmq1VfummfS3tDjqm3kjW_sInC7rHCm/pub?output=csv&gid=728295977';
    const CSV_VENTAS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6p8RVY5emhNgjqFlN3s3fVQ3vPDNfQ8UpTZz47RXvhjY3pWmq1VfummfS3tDjqm3kjW_sInC7rHCm/pub?output=csv&gid=0';
    const CSV_CLOSERS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6p8RVY5emhNgjqFlN3s3fVQ3vPDNfQ8UpTZz47RXvhjY3pWmq1VfummfS3tDjqm3kjW_sInC7rHCm/pub?output=csv&gid=1837437345';
    const CSV_METODOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6p8RVY5emhNgjqFlN3s3fVQ3vPDNfQ8UpTZz47RXvhjY3pWmq1VfummfS3tDjqm3kjW_sInC7rHCm/pub?output=csv&gid=878625665';

    let CURRENT_USER = null;
    let USUARIOS = [];
    let VENTAS = [];
    let CLOSERS = [];
    let METODOS = [];
    let FILTRO_EQUIPO = 'todos';

    async function loadCSV(url) {
      try {
        const response = await fetch(url);
        const text = await response.text();
        const lines = text.trim().split('\n');
        return lines.slice(1).map(line => line.split(','));
      } catch(err) {
        return [];
      }
    }

    async function loadData() {
      USUARIOS = await loadCSV(CSV_USUARIOS);
      VENTAS = await loadCSV(CSV_VENTAS);
      CLOSERS = await loadCSV(CSV_CLOSERS);
      METODOS = await loadCSV(CSV_METODOS);
    }

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      
      if (!email || !password) {
        showLoginError('Completa email y contraseña');
        return;
      }

      const user = USUARIOS.find(u => u[0] === email && u[2] === password);
      if (!user) {
        showLoginError('Email o contraseña incorrectos');
        return;
      }

      CURRENT_USER = { email: user[0], nombre: user[1], rol: user[3] };
      localStorage.setItem('currentUser', JSON.stringify(CURRENT_USER));
      
      document.getElementById('loginPage').classList.remove('active');
      document.getElementById('appPage').classList.add('active');
      updateUI();
      goPage('dashboard');
      
      if (CURRENT_USER.rol === 'CEO') document.getElementById('navUsers').classList.remove('hidden');
      if (['CEO', 'lider_financiero'].includes(CURRENT_USER.rol)) document.getElementById('navValidar').classList.remove('hidden');
    }

    function showLoginError(msg) {
      document.getElementById('loginError').textContent = msg;
      setTimeout(() => { document.getElementById('loginError').textContent = ''; }, 3000);
    }

    function logout() {
      localStorage.removeItem('currentUser');
      location.reload();
    }

    function goPage(page) {
      switch(page) {
        case 'dashboard': renderDashboard(); break;
        case 'ventas': renderVentas(); break;
        case 'registrar': renderRegistrar(); break;
        case 'closers': renderClosers(); break;
        case 'metodos': renderMetodos(); break;
        case 'validar': renderValidar(); break;
        case 'usuarios': renderUsuarios(); break;
      }
    }

    function renderDashboard() {
      let ventasFiltradas = VENTAS;
      let closersFiltrados = CLOSERS;

      if (FILTRO_EQUIPO !== 'todos') {
        ventasFiltradas = VENTAS.filter(v => v[3] === FILTRO_EQUIPO);
        closersFiltrados = CLOSERS.filter(c => c[4] === FILTRO_EQUIPO);
      } else if (!['CEO', 'lider_financiero'].includes(CURRENT_USER.rol)) {
        const miEquipo = CURRENT_USER.rol === 'lider_comercial' ? 'comercial' : 'revenue';
        ventasFiltradas = VENTAS.filter(v => v[3] === miEquipo);
        closersFiltrados = CLOSERS.filter(c => c[4] === miEquipo);
      }

      const total = ventasFiltradas.length;
      const dinero = ventasFiltradas.reduce((s, v) => s + (parseFloat(v[4]) || 0), 0);
      const validadas = ventasFiltradas.filter(v => v[9] === 'VALIDADA').length;
      const conv = total > 0 ? Math.round(validadas / total * 100) : 0;

      let html = `
        <div class="dashboard-header">
          <div class="dashboard-label">Dashboard General</div>
          <h1 class="dashboard-title">TRADESTARS LATAM</h1>
          <span class="dashboard-badge">👑 ${CURRENT_USER.rol}</span>
        </div>

        <div class="kpi-grid">
          <div class="kpi-card kpi-bar-blue">
            <div class="kpi-icon">📊</div>
            <div class="kpi-label">Total Ventas</div>
            <div class="kpi-value">${total}</div>
            <div class="kpi-subtitle">En el período</div>
            <div class="kpi-bar"><div class="kpi-bar-fill"></div></div>
          </div>

          <div class="kpi-card kpi-bar-green">
            <div class="kpi-icon">💰</div>
            <div class="kpi-label">Recaudado USD</div>
            <div class="kpi-value">$${(dinero / 1000).toFixed(1)}K</div>
            <div class="kpi-subtitle">Dinero en caja</div>
            <div class="kpi-bar"><div class="kpi-bar-fill"></div></div>
          </div>

          <div class="kpi-card kpi-bar-yellow">
            <div class="kpi-icon">✅</div>
            <div class="kpi-label">Validadas</div>
            <div class="kpi-value">${validadas}</div>
            <div class="kpi-subtitle">Pagos confirmados</div>
            <div class="kpi-bar"><div class="kpi-bar-fill"></div></div>
          </div>

          <div class="kpi-card kpi-bar-blue">
            <div class="kpi-icon">📈</div>
            <div class="kpi-label">Conversión</div>
            <div class="kpi-value">${conv}%</div>
            <div class="kpi-subtitle">Tasa de validación</div>
            <div class="kpi-bar"><div class="kpi-bar-fill"></div></div>
          </div>
        </div>

        <div class="card">
          <div class="section-title"><span class="section-icon">📋</span> Últimas Ventas</div>
          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Closer</th>
                <th>Equipo</th>
                <th>Monto</th>
                <th>Estado</th>
              </tr>
            </thead>
            <tbody>
              ${ventasFiltradas.length === 0 ? '<tr><td colspan="6" style="text-align: center; padding: 32px;">Sin ventas</td></tr>' : ventasFiltradas.slice(-10).reverse().map(v => `
                <tr>
                  <td><strong>${v[0]}</strong></td>
                  <td>${v[1]}</td>
                  <td>${v[2]}</td>
                  <td>${v[3]}</td>
                  <td>$${parseFloat(v[4]).toFixed(2)}</td>
                  <td><span class="badge ${v[9] === 'VALIDADA' ? '' : 'badge-warning'}">${v[9]}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    function renderVentas() { document.getElementById('content').innerHTML = '<div class="empty">Módulo de Ventas</div>'; }
    function renderRegistrar() { document.getElementById('content').innerHTML = '<div class="empty">Módulo de Registro</div>'; }
    function renderClosers() { document.getElementById('content').innerHTML = '<div class="empty">Módulo de Closers</div>'; }
    function renderMetodos() { document.getElementById('content').innerHTML = '<div class="empty">Módulo de Métodos</div>'; }
    function renderValidar() { document.getElementById('content').innerHTML = '<div class="empty">Panel de Validación</div>'; }
    function renderUsuarios() {
      let html = `
        <button class="btn" style="margin-bottom: 24px;">+ Nuevo Usuario</button>
        <div class="card">
          <table class="table">
            <thead><tr><th>Email</th><th>Nombre</th><th>Rol</th></tr></thead>
            <tbody>
              ${USUARIOS.map(u => `<tr><td>${u[0]}</td><td>${u[1]}</td><td><span class="badge">${u[3]}</span></td></tr>`).join('')}
            </tbody>
          </table>
        </div>
      `;
      document.getElementById('content').innerHTML = html;
    }

    function updateUI() {
      document.getElementById('userName').textContent = CURRENT_USER.nombre;
      document.getElementById('userRole').textContent = CURRENT_USER.rol;
    }

    function toast(msg) {
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    window.addEventListener('load', async () => {
      await loadData();
      const saved = localStorage.getItem('currentUser');
      if (saved) {
        CURRENT_USER = JSON.parse(saved);
        document.getElementById('loginPage').classList.remove('active');
        document.getElementById('appPage').classList.add('active');
        updateUI();
        goPage('dashboard');
        if (CURRENT_USER.rol === 'CEO') document.getElementById('navUsers').classList.remove('hidden');
        if (['CEO', 'lider_financiero'].includes(CURRENT_USER.rol)) document.getElementById('navValidar').classList.remove('hidden');
      }
    });

    setInterval(loadData, 5000);
  </script>
</body>
</html>
