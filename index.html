<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM Comercial — Tradestars</title>
  <style>
    :root {
      --bg: #0d0f1a;
      --card: #161929;
      --accent: #4f46e5;
      --text: #e8eaf6;
      --text2: #8b90b8;
      --border: #2e3350;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-wrap { width: 100%; max-width: 400px; padding: 20px; }
    .login-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 36px 32px; }
    .login-logo { text-align: center; margin-bottom: 32px; }
    .login-logo .brand { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 22px; }
    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .fi { width: 100%; background: #131626; border: 1px solid var(--border); border-radius: 8px; padding: 10px 13px; color: var(--text); font-size: 14px; font-family: inherit; }
    .btn { width: 100%; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: var(--accent); color: #fff; font-family: inherit; }
    .btn:hover { background: #4338ca; }
    #loginErr { display: none; background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 13px; }
    #appScreen { display: none; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">
        <div class="brand">⭐ TRADESTARS</div>
        <div style="font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--text2); margin-top: 4px;">CRM COMERCIAL</div>
      </div>
      <h2>Acceso</h2>
      <div class="fg">
        <label>Correo</label>
        <input type="email" id="loginEmail" class="fi" placeholder="tu@correo.com" value="gustavoctradestars@gmail.com">
      </div>
      <div class="fg">
        <label>Contraseña</label>
        <input type="password" id="loginPass" class="fi" placeholder="••••••••" value="Tradestars2026*">
      </div>
      <button class="btn" id="btnEntrar" onclick="doLogin()" disabled>INICIALIZANDO...</button>
      <div id="loginErr"></div>
    </div>
  </div>
</div>

<div id="appScreen">
  <h1>¡Bienvenido al CRM!</h1>
  <p id="userEmail"></p>
  <button onclick="doLogout()">Salir</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-compat/app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-compat/auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-compat/firestore.js"></script>

<script>
const FB_CONFIG = {
  apiKey: "AIzaSyDloPfAgKOIipDiB4CbWBiK3GENrum_NFo",
  authDomain: "comercial-tradestars.firebaseapp.com",
  projectId: "comercial-tradestars",
  appId: "1:388251272373:web:095cbd1a170addc7a4aafc"
};

let auth, db;

// ESPERAR a que Firebase esté listo
window.addEventListener('load', function() {
  setTimeout(() => {
    try {
      firebase.initializeApp(FB_CONFIG);
      auth = firebase.auth();
      db = firebase.firestore();
      
      document.getElementById('btnEntrar').disabled = false;
      document.getElementById('btnEntrar').textContent = 'ENTRAR';
      
      auth.onAuthStateChanged(user => {
        if (user) {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('appScreen').style.display = 'block';
          document.getElementById('userEmail').textContent = '👤 ' + user.email;
        } else {
          document.getElementById('loginScreen').style.display = 'flex';
          document.getElementById('appScreen').style.display = 'none';
        }
      });
    } catch (e) {
      console.error('Init error:', e);
    }
  }, 500);
});

async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  
  if (!email || !pass) {
    err.textContent = 'Completa los campos';
    err.style.display = 'block';
    return;
  }
  
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch (e) {
    err.textContent = 'Error: ' + e.message;
    err.style.display = 'block';
  }
}

function doLogout() {
  auth.signOut();
}
</script>

</body>
</html>
